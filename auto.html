<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Password Manager Test</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#4a5cff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h3>Login</h3>

<form id="loginForm">

<input 
type="text"
name="username"
placeholder="Username"
autocomplete="username"
required>

<input 
type="password"
name="password"
placeholder="Password"
autocomplete="current-password"
required>

<button type="submit">Login</button>

</form>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault()

// simulate login success
setTimeout(()=>{

alert("Login successful")

// redirect to trigger password save
window.location.href="https://example.com"

},1000)

})

</script>

</body>
</html>
